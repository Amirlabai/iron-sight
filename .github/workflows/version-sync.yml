name: Version Sync

on:
  push:
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine Change Type
        id: change_type
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" == major:* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == feat:* ]]; then
            echo "type=feat" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == fix:* ]]; then
            echo "type=fix" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Update Version File
        if: steps.change_type.outputs.type != 'none'
        run: |
          python scripts/version_util.py ${{ steps.change_type.outputs.type }}

      - name: Extract New Version
        id: new_version
        if: steps.change_type.outputs.type != 'none'
        run: echo "val=$(jq -r .version version.json)" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Change
        if: steps.change_type.outputs.type != 'none'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.val }} [skip ci]"
          git tag v${{ steps.new_version.outputs.val }}
          git push origin main --tags
          git push origin main

      - name: Create GitHub Release
        if: steps.change_type.outputs.type != 'none'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.new_version.outputs.val }}"
          name: "Release v${{ steps.new_version.outputs.val }}"
          body: |
            ### Tactical Update: ${{ steps.change_type.outputs.type }}
            - Automatically deployed via centralized version-sync.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
