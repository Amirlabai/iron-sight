<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON SIGHT | Tactical Dispatcher</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0d1117;
            --accent: #ff4d4d;
            --panel: rgba(22, 27, 34, 0.9);
            --text: #e6edf3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background: #121212;
        }

        /* --- Active Alert Icons (Top-Left Overlay) --- */
        .active-alerts-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .active-alert-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            font-family: monospace;
            letter-spacing: 0.5px;
            animation: slideIn 0.3s ease-out;
            cursor: default;
            min-width: 180px;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .alert-icon-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: iconPulse 1.5s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .alert-icon-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .alert-icon-close {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .alert-icon-close:hover {
            color: #ff4d4d;
        }

        /* --- Bottom Bar Control Panel --- */
        .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-bar h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--accent);
            white-space: nowrap;
        }

        .control-bar .city-list {
            flex: 1;
            max-height: 60px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            min-width: 100px;
        }

        .city-tag {
            display: inline-block;
            background: rgba(255, 77, 77, 0.2);
            color: #ff944d;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .control-bar select {
            padding: 8px 10px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-size: 11px;
            white-space: nowrap;
        }

        .btn-fire {
            background: var(--accent);
            color: white;
        }

        .btn-fire:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .btn-end {
            background: #333;
            color: #888;
        }

        .btn-end:hover {
            background: #444;
            color: white;
        }

        .status {
            font-size: 10px;
            color: #888;
            font-family: monospace;
            white-space: nowrap;
        }

        .leaflet-container {
            background-color: #0d1117 !important;
        }

        .leaflet-interactive {
            stroke-width: 1px !important;
            stroke: #000 !important;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- Active Alert Icons (Top-Left) -->
    <div class="active-alerts-layer" id="active-alerts-layer"></div>

    <!-- Bottom Bar Controls -->
    <div class="control-bar">
        <h2>DISPATCHER</h2>

        <div class="city-list" id="selection-list">
            <span style="opacity:0.5">No targets selected...</span>
        </div>

        <select id="threat-type" onchange="updateThreatStyle()">
            <option value="missiles" selected>Rocket Salvo</option>
            <option value="hostileAircraftIntrusion">Hostile Aircraft (Drone)</option>
            <option value="terroristInfiltration">Terrorist Infiltration</option>
            <option value="earthQuake">Earthquake Alert</option>
            <option value="newsFlash">News Flash (PTW)</option>
        </select>

        <button class="btn-fire" id="btn-dispatch" onclick="dispatchAlert()">DISPATCH</button>
        <button class="btn-end" onclick="signalTerminationAll()">END ALL</button>

        <div class="status" id="status-log">
            SYSTEM READY.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([31.7, 35.2], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let cities = [];
        let selectedCities = new Set();
        let activeAlerts = {};  // Mirrors server's active_alerts

        const THREAT_COLORS = {
            "missiles": "#ff4d4d",
            "hostileAircraftIntrusion": "#ff9500",
            "terroristInfiltration": "#b518ff",
            "earthQuake": "#4cd964",
            "newsFlash": "#f8f8f8"
        };

        const THREAT_LABELS = {
            "missiles": "ROCKET",
            "hostileAircraftIntrusion": "DRONE",
            "terroristInfiltration": "INFILTRATION",
            "earthQuake": "SEISMIC",
            "newsFlash": "NEWSFLASH"
        };

        // Loading Data
        async function loadCities() {
            try {
                const response = await fetch('http://localhost:8080/api/cities');
                if (!response.ok) throw new Error("Backend not responding or CORS missing");
                const areas = await response.json();

                for (const area in areas) {
                    for (const name in areas[area]) {
                        cities.push({
                            name: name,
                            lat: parseFloat(areas[area][name].lat),
                            lon: parseFloat(areas[area][name].long)
                        });
                    }
                }
                renderCities();
                log("LOADED " + cities.length + " TACTICAL POINTS.");
            } catch (e) {
                log("CITIES_ERROR: Ensure main.py is running on :8080 and CORS allows :8081.");
            }
        }

        function renderCities() {
            cities.forEach(city => {
                const marker = L.circleMarker([city.lat, city.lon], {
                    radius: 6,
                    fillColor: "#4d94ff",
                    color: "#000",
                    weight: 1,
                    opacity: 0.5,
                    fillOpacity: 0.5
                }).addTo(map);

                marker.on('click', () => toggleCity(city, marker));
            });
        }

        function toggleCity(city, marker) {
            if (selectedCities.has(city.name)) {
                selectedCities.delete(city.name);
                marker.setStyle({ fillColor: "#4d94ff", weight: 1 });
            } else {
                selectedCities.add(city.name);
                marker.setStyle({ fillColor: "#ff4d4d", weight: 2 });
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const list = document.getElementById('selection-list');
            if (selectedCities.size === 0) {
                list.innerHTML = '<span style="opacity:0.5">No targets selected...</span>';
                return;
            }
            list.innerHTML = Array.from(selectedCities).map(c => `<span class="city-tag">${c}</span>`).join('');
        }

        function updateThreatStyle() {
            const type = document.getElementById('threat-type').value;
            const btn = document.getElementById('btn-dispatch');
            
            const styles = {
                "missiles": { color: "#ff4d4d", label: "DISPATCH SALVO" },
                "hostileAircraftIntrusion": { color: "#ff944d", label: "DISPATCH DRONE" },
                "terroristInfiltration": { color: "#b518ff", label: "DISPATCH INFILTRATION" },
                "earthQuake": { color: "#4cd964", label: "DISPATCH SEISMIC" },
                "newsFlash": { color: "#f8f8f8", label: "DISPATCH NEWSFLASH" }
            };
            
            const config = styles[type] || styles.missiles;
            btn.style.background = config.color;
            btn.innerText = config.label;
            document.documentElement.style.setProperty('--accent', config.color);
        }

        async function dispatchAlert() {
            if (selectedCities.size === 0) return alert("Select at least one target.");
            const type = document.getElementById('threat-type').value;

            try {
                const resp = await fetch('/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        cities: Array.from(selectedCities),
                        type: type
                    })
                });
                const data = await resp.json();
                if (resp.ok) {
                    const alertId = data.payload.id;
                    activeAlerts[alertId] = {
                        type: type,
                        cities: Array.from(selectedCities),
                        time: data.payload.time
                    };
                    renderActiveAlerts();
                    log("DISPATCHED [" + type + "]: " + alertId);
                    
                    // Clear selection after dispatch
                    selectedCities.clear();
                    updateSelectionUI();
                    map.eachLayer(l => { if (l.setStyle) l.setStyle({ fillColor: "#4d94ff", weight: 1 }); });
                }
            } catch (e) {
                log("FETCH_ERROR: Simulator server unreachable.");
            }
        }

        async function terminateAlert(alertId) {
            try {
                const resp = await fetch('/end', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: alertId })
                });
                if (resp.ok) {
                    delete activeAlerts[alertId];
                    renderActiveAlerts();
                    log("TERMINATED: " + alertId);
                }
            } catch (e) {
                log("FETCH_ERROR: Simulator server unreachable.");
            }
        }

        async function signalTerminationAll() {
            try {
                const resp = await fetch('/end', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                if (resp.ok) {
                    activeAlerts = {};
                    renderActiveAlerts();
                    log("ALL ALERTS TERMINATED.");
                    map.eachLayer(l => { if (l.setStyle) l.setStyle({ fillColor: "#4d94ff", weight: 1 }); });
                }
            } catch (e) {
                log("FETCH_ERROR: Simulator server unreachable.");
            }
        }

        function renderActiveAlerts() {
            const layer = document.getElementById('active-alerts-layer');
            const ids = Object.keys(activeAlerts);
            
            if (ids.length === 0) {
                layer.innerHTML = '';
                return;
            }

            layer.innerHTML = ids.map(id => {
                const info = activeAlerts[id];
                const color = THREAT_COLORS[info.type] || '#ff4d4d';
                const label = THREAT_LABELS[info.type] || 'ALERT';
                return `
                    <div class="active-alert-icon" style="border-left: 3px solid ${color}">
                        <div class="alert-icon-dot" style="background: ${color}; box-shadow: 0 0 8px ${color}"></div>
                        <span class="alert-icon-label">${label} | ${info.cities.length} TGT | ${info.time}</span>
                        <button class="alert-icon-close" onclick="terminateAlert('${id}')" title="End this alert">&times;</button>
                    </div>
                `;
            }).join('');
        }

        function log(msg) {
            document.getElementById('status-log').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        }

        loadCities();
    </script>
</body>

</html>
